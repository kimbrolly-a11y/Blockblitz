<svg viewBox="0 0 120 132" xmlns="http://www.w3.org/2000/svg">
  <!-- Ground shadow -->
  <ellipse cx="60" cy="128" rx="32" ry="5" fill="rgba(0,0,0,0.13)"/>

  <!-- ── EARS (behind head) ── -->
  <!-- Left ear -->
  <ellipse cx="20" cy="36" rx="17" ry="19" fill="#bf9060"/>
  <ellipse cx="20" cy="37" rx="9"  ry="12" fill="#f5a0a8"/>
  <!-- Right ear -->
  <ellipse cx="100" cy="36" rx="17" ry="19" fill="#bf9060"/>
  <ellipse cx="100" cy="37" rx="9"  ry="12" fill="#f5a0a8"/>

  <!-- ── BODY ── -->
  <ellipse cx="60" cy="96" rx="43" ry="38" fill="#c89a68"/>
  <!-- Belly -->
  <ellipse cx="60" cy="100" rx="26" ry="26" fill="#eddbb0"/>

  <!-- ── HEAD ── -->
  <ellipse cx="60" cy="54" rx="40" ry="36" fill="#c89a68"/>

  <!-- Chubby cheek pouches -->
  <ellipse cx="18" cy="62" rx="15" ry="12" fill="#c89a68"/>
  <ellipse cx="102" cy="62" rx="15" ry="12" fill="#c89a68"/>

  <!-- Cheek blush -->
  <ellipse cx="19"  cy="64" rx="9" ry="6" fill="#f08898" opacity="0.45"/>
  <ellipse cx="101" cy="64" rx="9" ry="6" fill="#f08898" opacity="0.45"/>

  <!-- ── EYES ── -->
  <!-- Left eye -->
  <circle cx="43" cy="48" r="10" fill="#111"/>
  <circle cx="46" cy="44" r="4"  fill="white"/>
  <circle cx="41" cy="46" r="2"  fill="white" opacity="0.55"/>
  <!-- Right eye -->
  <circle cx="77" cy="48" r="10" fill="#111"/>
  <circle cx="80" cy="44" r="4"  fill="white"/>
  <circle cx="75" cy="46" r="2"  fill="white" opacity="0.55"/>

  <!-- ── NOSE ── -->
  <ellipse cx="60" cy="62" rx="6" ry="4.5" fill="#e05868"/>

  <!-- ── MOUTH + TEETH ── -->
  <path d="M51 68 Q60 76 69 68" stroke="#b04050" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Two little teeth -->
  <rect x="55.5" y="68" width="7"  height="7" rx="1.5" fill="white"/>
  <rect x="57.5" y="68" width="0.8" height="7" rx="0.4" fill="#ddd"/>

  <!-- ── FOREHEAD HIGHLIGHT ── -->
  <ellipse cx="60" cy="34" rx="14" ry="8" fill="#d4a878" opacity="0.4"/>

  <!-- ── LEFT PAW ── -->
  <ellipse cx="18" cy="104" rx="15" ry="12" fill="#c89a68"/>
  <circle cx="10" cy="96"  r="5" fill="#f0a090"/>
  <circle cx="17" cy="93"  r="5" fill="#f0a090"/>
  <circle cx="24" cy="95"  r="5" fill="#f0a090"/>

  <!-- ── RIGHT PAW ── -->
  <ellipse cx="102" cy="104" rx="15" ry="12" fill="#c89a68"/>
  <circle cx="110" cy="96"  r="5" fill="#f0a090"/>
  <circle cx="103" cy="93"  r="5" fill="#f0a090"/>
  <circle cx="96"  cy="95"  r="5" fill="#f0a090"/>

  <!-- ── FEET ── -->
  <ellipse cx="41" cy="128" rx="17" ry="7" fill="#f0a090"/>
  <ellipse cx="79" cy="128" rx="17" ry="7" fill="#f0a090"/>
</svg>
